syntax = "proto3";

package campsite.v1;

option go_package = "campsite.rocks/campsite/proto/campsite/v1;campsitev1";

import "google/api/annotations.proto";

import "campsite/v1/models.proto";

message GetFeedRequest {
    int32 parent_depth = 1;
    string page_token = 2;
    int32 limit = 3;
}

message GetFeedResponse {
    repeated Publication publications = 1;
    PageTokenPair page_tokens = 2;
}

message WaitForFeedRequest {
    string page_token = 1;
}

message WaitForFeedResponse {
}

service Topics {
    rpc GetFeed(GetFeedRequest) returns (GetFeedResponse) {
        option (google.api.http) = {
            get: "/v1/feed"
        };
    }

    rpc WaitForFeed(WaitForFeedRequest) returns (WaitForFeedResponse) {
        option (google.api.http) = {
            get: "/v1/feed/wait"
        };
    }
}
